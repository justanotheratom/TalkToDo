appId: llc.fungee.talktodo
name: Create And History
---
- tapOn:
    id: "voice_input_button"
- runFlow: "helpers/slow_pause.yaml"
- tapOn:
    id: "text_input_field"
- inputText: "Weekend errands"
- runFlow: "helpers/slow_pause.yaml"
- tapOn:
    id: "send_text_button"
- runFlow: "helpers/slow_pause.yaml"
- extendedWaitUntil:
    visible: "Weekend errands"
    timeout: 5000
- tapOn:
    id: "voice_input_button"
- runFlow: "helpers/slow_pause.yaml"
- tapOn:
    id: "text_input_field"
- inputText: "Grocery Run: Milk, Eggs"
- runFlow: "helpers/slow_pause.yaml"
- tapOn:
    id: "send_text_button"
- runFlow: "helpers/slow_pause.yaml"
- extendedWaitUntil:
    visible: "Grocery Run"
    timeout: 5000
- tapOn: "Open Grocery Run"
- runFlow: "helpers/slow_pause.yaml"
- extendedWaitUntil:
    visible: "Milk"
    timeout: 5000
- assertVisible: "Eggs"
- tapOn: "TalkToDo"
- runFlow: "helpers/slow_pause.yaml"
- tapOn:
    id: "settings_button"
- runFlow: "helpers/slow_pause.yaml"
- tapOn:
    id: "history_link"
- runFlow: "helpers/slow_pause.yaml"
- extendedWaitUntil:
    visible: "History"
    timeout: 3000
- assertVisible: "Created"
- assertVisible: "Weekend errands"
- assertVisible: "Grocery Run"
- tapOn: "Done"
- runFlow: "helpers/slow_pause.yaml"
- tapOn:
    id: "settings_done_button"
- runFlow: "helpers/slow_pause.yaml"
- assertVisible: "Weekend errands"
