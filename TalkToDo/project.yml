name: TalkToDo
options:
  bundleIdPrefix: com.talktodo
  deploymentTarget:
    iOS: "18.5"
    macOS: "15.7"
  xcodeVersion: "16.0"

packages:
  TalkToDoPackage:
    path: TalkToDoPackage

targets:
  TalkToDo:
    type: application
    platform: iOS
    deploymentTarget: "18.5"
    preBuildScripts:
      - name: Copy Local DotEnv
        script: |
          sh "${SRCROOT}/../scripts/copy-dotenv-into-app.sh"
        inputFiles:
          - $(SRCROOT)/../.env
          - $(SRCROOT)/../scripts/copy-dotenv-into-app.sh
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/talktodo.env
        basedOnDependencyAnalysis: false
    sources:
      - path: iOS
    resources:
      - path: iOS/Assets.xcassets
    dependencies:
      - package: TalkToDoPackage
        product: TalkToDoFeature
      - package: TalkToDoPackage
        product: TalkToDoShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: llc.fungee.talktodo
        INFOPLIST_FILE: iOS/Info.plist
        SWIFT_VERSION: "5.9"
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: iOS/TalkToDo.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: iOS/Info.plist
      properties:
        CFBundleDisplayName: TalkToDo
        UILaunchScreen: {}
        UIBackgroundModes:
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        NSMicrophoneUsageDescription: "TalkToDo needs microphone access to capture your voice."
        NSSpeechRecognitionUsageDescription: "TalkToDo uses speech recognition to convert your voice to structured lists."
        TalkToDoDotEnvPath: "$(SRCROOT)/../.env"

  TalkToDo-macOS:
    type: application
    platform: macOS
    deploymentTarget: "15.7"
    sources:
      - path: macOS
    resources:
      - path: macOS/Assets.xcassets
    dependencies:
      - package: TalkToDoPackage
        product: TalkToDoFeature
      - package: TalkToDoPackage
        product: TalkToDoShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talktodo.macos
        INFOPLIST_FILE: macOS/Info.plist
        SWIFT_VERSION: "5.9"
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: macOS/TalkToDo.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: macOS/Info.plist
      properties:
        CFBundleDisplayName: TalkToDo
        NSMicrophoneUsageDescription: "TalkToDo needs microphone access to capture your voice."
        NSSpeechRecognitionUsageDescription: "TalkToDo uses speech recognition to convert your voice to structured lists."
        TalkToDoDotEnvPath: "$(SRCROOT)/../.env"
